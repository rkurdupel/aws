{% extends 'base.html' %}

{% block content %}
<h1>User Login</h1>
<form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    
    {{ form.as_p }}
    <button type="submit">Login</button>
    
    <br>
    <br>
    <h3>Not registered yet ?</h3>
    <a href="{% url 'register' %}">
        <h3>Register here !</h3>
    </a>
</form>
{% endblock %}
